services:
  - type: web
    name: ygo-referee-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: bash render-build.sh
    startCommand: gunicorn --bind 0.0.0.0:$PORT app:app
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.6
      - key: ALLOWED_ORIGIN
        sync: false
